worker_processes auto;
events { worker_connections 2048; use epoll; }

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on; tcp_nopush on; tcp_nodelay on; keepalive_timeout 65;
    client_max_body_size 110M;

    # Gzip
    gzip on; gzip_vary on; gzip_proxied any; gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=20r/m;
    limit_req_zone $binary_remote_addr zone=predict:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=300r/m;

    upstream backend  { server backend:8000;  keepalive 32; }
    upstream frontend { server frontend:3000; keepalive 16; }

    # HTTP -> HTTPS
    server {
        listen 80; server_name _;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name your-domain.com;
        ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off; ssl_session_cache shared:SSL:10m;
        ssl_stapling on; ssl_stapling_verify on;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://your-domain.com;" always;

        # Auth (strict)
        location ~ ^/api/v1/auth/(login|register) {
            limit_req zone=auth burst=5 nodelay; limit_req_status 429;
            proxy_pass http://backend;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Predict (moderate)
        location ~ ^/api/v1/predict {
            limit_req zone=predict burst=20 nodelay; limit_req_status 429;
            proxy_pass http://backend; proxy_read_timeout 120s;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # All other API
        location /api/ {
            limit_req zone=general burst=50 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/(docs|openapi\.json) { proxy_pass http://backend; proxy_set_header Host $host; }

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade";
        }
    }
}
